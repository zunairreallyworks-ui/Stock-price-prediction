<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Forest Regressor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ml.css') }}" />
  </head>
  <body>
    <header class="navbar">
      <nav>
        <ul>
          <li><a href="/deep-learning">Deep Learning Models</a></li>
          <li><a href="/ml" class="active">Machine Learning Models</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Random Forest Model Control Panel</h1>
      <p style="text-align: center">
        Adjust training split and select a stock symbol.
      </p>

      <div style="text-align: center; margin-top: 30px">
        <label for="symbolSelector">Select Stock:</label>
        <select id="symbolSelector">
          <option value="AAPL">AAPL</option>
          <option value="NVDA">NVDA</option>
          <option value="SP500">SP500</option>
        </select>

        <br /><br />

        <label for="trainSlider">Training Data Percentage:</label>
        <input
          type="range"
          id="trainSlider"
          min="10"
          max="95"
          value="80"
          step="1"
          oninput="updateValue()"
        />
        <span id="sliderValue">80% training / 20% prediction</span>

        <div class="button-container" style="margin-top: 20px">
          <button onclick="sendTrainingSplit()">Apply & Run Model</button>
        </div>
      </div>

      <div
        style="width: 90%; max-width: 900px; height: 500px; margin: 40px auto"
      >
        <canvas id="rfChart"></canvas>
      </div>

      <div id="rf-scores" style="text-align: center; margin-top: 20px">
        <h3>Evaluation Metrics</h3>
        <p>MAE: <span id="mae">Loading...</span></p>
        <p>RMSE: <span id="rmse">Loading...</span></p>
      </div>
    </main>

    <!-- Chart.js and Luxon -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.0"></script>

    <!-- External Chart Handling -->
    <script src="{{ url_for('static', filename='chart_random_forest.js') }}"></script>
  </body>
</html>
