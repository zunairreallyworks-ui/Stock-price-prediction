<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Regression Model</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ml.css') }}" />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <ul>
          <li><a href="/deep-learning">Deep Learning Models</a></li>
          <li><a href="/ml" class="active">Machine Learning Models</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Linear Regression Model</h1>

      <div class="slider-section" style="text-align: center; margin-top: 30px">
        <label for="symbolSelector">Select Stock:</label>
        <select id="symbolSelector">
          <option value="AAPL">AAPL</option>
          <option value="NVDA">NVDA</option>
          <option value="SP500">SP500</option>
        </select>

        <br /><br />

        <label for="trainSlider">Training Data Percentage:</label>
        <input
          type="range"
          id="trainSlider"
          min="10"
          max="95"
          value="80"
          step="1"
          oninput="updateValue()"
        />
        <div
          class="slider-value"
          id="sliderValue"
          style="
            font-size: 18px;
            font-weight: bold;
            color: #ef8354;
            margin-top: 10px;
          "
        >
          80% training / 20% prediction
        </div>
        <button onclick="sendTrainingSplit()">Apply & Run Model</button>
      </div>

      <canvas
        id="lrChart"
        width="800"
        height="400"
        style="margin-top: 40px"
      ></canvas>

      <div id="lr-scores" style="text-align: center; margin-top: 20px">
        <h3>Evaluation Metrics</h3>
        <p>MAE: <span id="mae">Loading...</span></p>
        <p>RMSE: <span id="rmse">Loading...</span></p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <script src="{{ url_for('static', filename='chart_lr.js') }}"></script>
  </body>
</html>
