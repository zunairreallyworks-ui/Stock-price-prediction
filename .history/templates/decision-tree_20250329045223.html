<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Tree Control Panel</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='deep-learning.css') }}"
    />
  </head>

  <body>
    <header class="navbar">
      <nav>
        <ul>
          <li><a href="/deep-learning">Deep Learning Models</a></li>
          <li><a href="/ml">Machine Learning Models</a></li>
          <li><a href="/ai-overview">AI Overview</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Decision Tree Model Control Panel</h1>
      <p>
        Training Data Percentage:
        <input
          type="range"
          id="trainSlider"
          min="50"
          max="95"
          value="80"
          step="1"
          oninput="updateValue()"
        />
        <span id="sliderValue">80% training / 20% prediction</span>
      </p>
      <div class="button-container">
        <button onclick="trainModel()">Apply & Run Model</button>
      </div>

      <canvas id="decisionTreeChart" width="800" height="400"></canvas>

      <h2>Evaluation Metrics</h2>
      <p>MAE: <span id="mae">N/A</span></p>
      <p>RMSE: <span id="rmse">N/A</span></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='chart_decision_tree.js') }}"></script>
  </body>
</html>
